name: Repository validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Install validation dependency
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ripgrep

      - name: Validate public repository boundary
        id: validation
        continue-on-error: true
        env:
          VALIDATION_QUIET: "1"
        run: |
          set -o pipefail
          ./deploy/scripts/validate-repository.sh 2>&1 | tee validation-report.txt

      - name: Upload failed validation report
        if: steps.validation.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repository-validation-report
          path: validation-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce validation result
        if: steps.validation.outcome == 'failure'
        run: exit 1
