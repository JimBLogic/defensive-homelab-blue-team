name: defensive-homelab-blue-team
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
x-security: &default-security
  security_opt:
    - no-new-privileges:true
services:
  uptime-kuma:
    image: ${UPTIME_KUMA_IMAGE}
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    ports: ["127.0.0.1:${UPTIME_KUMA_PORT:-3001}:3001"]
    volumes: [uptime_kuma_data:/app/data]
    networks: [monitoring]
    mem_limit: 384m
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD", "node", "extra/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}
      - --web.enable-lifecycle
    ports: ["127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus
    networks: [monitoring, metrics]
    mem_limit: 512m
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
  node-exporter:
    image: ${NODE_EXPORTER_IMAGE}
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($$|/)
    pid: host
    read_only: true
    volumes:
      - /:/host:ro,rslave # required for host metrics; no host port is published
    networks: [metrics]
    mem_limit: 128m
    logging: *default-logging
    <<: *default-security
  grafana:
    image: ${GRAFANA_IMAGE}
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports: ["127.0.0.1:${GRAFANA_PORT:-3000}:3000"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [monitoring, metrics]
    depends_on: [prometheus]
    mem_limit: 512m
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
volumes:
  uptime_kuma_data: {}
  prometheus_data: {}
  grafana_data: {}
  adguard_work: {}
  adguard_conf: {}
  crowdsec_data: {}
  crowdsec_config: {}
networks:
  monitoring: { driver: bridge }
  metrics: { driver: bridge, internal: true }
  dns: { driver: bridge }
  detection: { driver: bridge, internal: true }
