name: defensive-homelab-blue-team

services:
  uptime-kuma:
    image: ${UPTIME_KUMA_IMAGE}
    container_name: blue-team-uptime-kuma
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: blue-team-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
      - metrics
    security_opt:
      - no-new-privileges:true

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE}
    container_name: blue-team-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($$|/)
    pid: host
    read_only: true
    volumes:
      - /:/host:ro,rslave
    networks:
      - metrics
    security_opt:
      - no-new-privileges:true

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: blue-team-grafana
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring
      - metrics
    security_opt:
      - no-new-privileges:true
    depends_on:
      - prometheus

  cadvisor:
    image: ${CADVISOR_IMAGE}
    container_name: blue-team-cadvisor
    restart: unless-stopped
    profiles:
      - containers
    privileged: true
    read_only: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - metrics
    security_opt:
      - no-new-privileges:true

  adguard-home:
    image: ${ADGUARD_HOME_IMAGE}
    container_name: blue-team-adguard-home
    restart: unless-stopped
    profiles:
      - dns
    ports:
      - "127.0.0.1:${ADGUARD_ADMIN_PORT:-3002}:3000"
      - "127.0.0.1:${ADGUARD_DNS_PORT:-5353}:53/tcp"
      - "127.0.0.1:${ADGUARD_DNS_PORT:-5353}:53/udp"
    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf
    networks:
      - dns
    security_opt:
      - no-new-privileges:true

volumes:
  uptime_kuma_data:
  prometheus_data:
  grafana_data:
  adguard_work:
  adguard_conf:
  crowdsec_data:
  crowdsec_config:

networks:
  monitoring:
    driver: bridge
  metrics:
    driver: bridge
    internal: true
  dns:
    driver: bridge
  detection:
    driver: bridge
    internal: true
